name: tests

# run the whole suite on every push and pull request, so the green check on the
# repo is the truth, not a promise.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy      # pygame runs headless on the runner
      SDL_AUDIODRIVER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install dependencies
        run: pip install -r requirements.txt
      - name: run the test suite
        run: python -m unittest discover -p "test_*.py"
