<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>EchoSelf</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="room">
    <header class="top">
      <span class="dot" aria-hidden="true"></span>
      <span class="here" id="here">she's here</span>
    </header>

    <section class="thread" id="thread" aria-live="polite"></section>

    <form class="say" id="say" autocomplete="off">
      <textarea id="box" rows="1" placeholder="say anything. there's no wrong thing to say."
                aria-label="say something"></textarea>
      <button id="send" type="submit" aria-label="send">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M4 12h13M11 6l6 6-6 6" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </main>

  <script src="/app.js"></script>
</body>
</html>
